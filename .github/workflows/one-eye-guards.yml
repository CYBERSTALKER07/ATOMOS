name: One Eye Guards

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/one-eye-guards.yml'
      - 'pegasus/.github/workflows/ci.yml'
      - '.agents/extensions/ast-engine/**'
      - 'pegasus/scripts/guard_utils.py'
      - 'pegasus/scripts/contract_drift_guard.py'
      - 'pegasus/scripts/architecture_boundary_guard.py'
      - 'pegasus/scripts/design_token_enforcement_guard.py'
      - 'pegasus/scripts/contract_guard_mcp.py'
      - 'pegasus/scripts/architecture_guard_mcp.py'
      - 'pegasus/scripts/design_system_guard_mcp.py'
      - 'pegasus/scripts/production_safety_guard.py'
      - 'pegasus/scripts/visual_test_intelligence_guard.py'
      - 'pegasus/scripts/security_guard.py'
      - 'pegasus/apps/backend-go/**/*.go'
      - 'pegasus/apps/backend-go/kafka/**'
      - 'pegasus/apps/backend-go/notifications/**'
      - 'pegasus/apps/ai-worker/**'
      - 'pegasus/packages/types/**'
      - 'pegasus/packages/api-client/**'
      - 'pegasus/packages/validation/**'
      - 'pegasus/packages/optimizer-contract/**'
      - 'pegasus/apps/admin-portal/**'
      - 'pegasus/apps/factory-portal/**'
      - 'pegasus/apps/warehouse-portal/**'
      - 'pegasus/apps/retailer-app-desktop/**'
      - 'pegasus/apps/driverappios/**'
      - 'pegasus/apps/payload-terminal/**'
      - 'pegasus/apps/*-app-android/**'
      - 'pegasus/apps/*-app-ios/**'
      - 'pegasus/packages/ui-kit/**'
      - 'pegasus/infra/**'
      - 'pegasus/docker-compose.yml'
      - 'tests/**'
      - 'pegasus/tests/**'
      - 'pegasus/playwright.config.ts'
      - 'pegasus/context/design-system.md'

permissions:
  contents: read

jobs:
  one-eye-guards:
    name: One Eye Guard Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: One-eye relevant paths filter
        id: one_eye_paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '.github/workflows/one-eye-guards.yml'
              - 'pegasus/.github/workflows/ci.yml'
              - '.agents/extensions/ast-engine/**'
              - 'pegasus/scripts/guard_utils.py'
              - 'pegasus/scripts/contract_drift_guard.py'
              - 'pegasus/scripts/architecture_boundary_guard.py'
              - 'pegasus/scripts/design_token_enforcement_guard.py'
              - 'pegasus/scripts/contract_guard_mcp.py'
              - 'pegasus/scripts/architecture_guard_mcp.py'
              - 'pegasus/scripts/design_system_guard_mcp.py'
              - 'pegasus/scripts/production_safety_guard.py'
              - 'pegasus/scripts/visual_test_intelligence_guard.py'
              - 'pegasus/scripts/security_guard.py'
              - 'pegasus/apps/backend-go/**/*.go'
              - 'pegasus/apps/backend-go/kafka/**'
              - 'pegasus/apps/backend-go/notifications/**'
              - 'pegasus/apps/ai-worker/**'
              - 'pegasus/packages/types/**'
              - 'pegasus/packages/api-client/**'
              - 'pegasus/packages/validation/**'
              - 'pegasus/packages/optimizer-contract/**'
              - 'pegasus/apps/admin-portal/**'
              - 'pegasus/apps/factory-portal/**'
              - 'pegasus/apps/warehouse-portal/**'
              - 'pegasus/apps/retailer-app-desktop/**'
              - 'pegasus/apps/driverappios/**'
              - 'pegasus/apps/payload-terminal/**'
              - 'pegasus/apps/*-app-android/**'
              - 'pegasus/apps/*-app-ios/**'
              - 'pegasus/packages/ui-kit/**'
              - 'pegasus/infra/**'
              - 'pegasus/docker-compose.yml'
              - 'tests/**'
              - 'pegasus/tests/**'
              - 'pegasus/playwright.config.ts'
              - 'pegasus/context/design-system.md'

      - name: Skip one-eye guard suite (no relevant path changes)
        if: steps.one_eye_paths.outputs.relevant != 'true'
        run: echo "No one-eye relevant paths changed; skipping."

      - uses: actions/setup-python@v5
        if: steps.one_eye_paths.outputs.relevant == 'true'
        with:
          python-version: '3.12'

      - name: Contract Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/contract_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Architecture Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/architecture_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Design System Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/design_system_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Production Safety Guard
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/production_safety_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Visual + Test Intelligence
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/visual_test_intelligence_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Security Guard
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/security_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"
