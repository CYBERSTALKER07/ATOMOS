name: CI — Build · Test · Push

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  id-token: write   # Workload Identity Federation — no JSON key files

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-south1
  GAR_REPO: ${{ vars.GAR_REPO }}              # e.g. asia-south1-docker.pkg.dev/<project>/void
  SPANNER_EMULATOR_HOST: localhost:9010

jobs:
  # ── Go backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend — build · vet · test
    runs-on: ubuntu-latest

    services:
      spanner-emulator:
        image: gcr.io/cloud-spanner-emulator/emulator:latest
        ports:
          - 9010:9010
          - 9020:9020

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: the-lab-monorepo/apps/backend-go/go.mod
          cache: true

      - name: go mod tidy — backend
        working-directory: the-lab-monorepo
        run: go work sync

      - name: go vet — backend
        working-directory: the-lab-monorepo
        run: go vet ./apps/backend-go/...

      - name: go build — backend
        working-directory: the-lab-monorepo
        run: go build ./apps/backend-go/...

      - name: go test — backend (race detector)
        working-directory: the-lab-monorepo
        env:
          REDIS_ADDR: localhost:6379
          SPANNER_EMULATOR_HOST: localhost:9010
          SPANNER_PROJECT_ID: void-test
          SPANNER_INSTANCE_ID: void-instance
          SPANNER_DATABASE_ID: void-db
          JWT_SECRET: ci-test-secret-32-chars-long-pad
          INTERNAL_API_KEY: ci-internal-key
          KAFKA_BROKER_ADDRESS: ""   # Kafka skipped in unit tests
        run: go test -race -timeout 120s ./apps/backend-go/...

  # ── AI worker ─────────────────────────────────────────────────────────────
  ai-worker:
    name: AI Worker — build · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: the-lab-monorepo/apps/ai-worker/go.mod
          cache: true

      - name: go vet — ai-worker
        working-directory: the-lab-monorepo
        run: go vet ./apps/ai-worker/...

      - name: go build — ai-worker
        working-directory: the-lab-monorepo
        run: go build ./apps/ai-worker/...

      - name: go test — ai-worker
        working-directory: the-lab-monorepo
        run: go test -race -timeout 60s ./apps/ai-worker/...

  # ── Admin portal ──────────────────────────────────────────────────────────
  admin-portal:
    name: Admin Portal — type-check · lint · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: the-lab-monorepo/apps/admin-portal/package-lock.json

      - name: npm ci
        working-directory: the-lab-monorepo/apps/admin-portal
        run: npm ci

      - name: TypeScript type-check
        working-directory: the-lab-monorepo/apps/admin-portal
        run: npx tsc --noEmit

      - name: vitest
        working-directory: the-lab-monorepo/apps/admin-portal
        run: npx vitest run --reporter=github-actions

  # ── Docker build + push to GAR (main branch only) ─────────────────────────
  docker-push:
    name: Docker — build and push to GAR
    runs-on: ubuntu-latest
    needs: [backend, ai-worker, admin-portal]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - app: backend-go
            context: the-lab-monorepo/apps/backend-go
            image: backend
          - app: ai-worker
            context: the-lab-monorepo/apps/ai-worker
            image: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — no JSON key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.GAR_REPO }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.GAR_REPO }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
