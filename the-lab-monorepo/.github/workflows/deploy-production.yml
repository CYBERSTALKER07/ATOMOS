name: Leviathan Production Matrix

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend-go/**'
      - 'packages/**'
      - 'infra/terraform/**'

env:
  GCP_REGION: asia-south1
  GAR_REPO: lab-repo
  IMAGE_NAME: lab-gateway

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write' # Required for Keyless Workload Identity Authentication

    steps:
      - name: Checkout Monorepo
        uses: actions/checkout@v4

      # 1. Keyless Google Cloud Authentication (Zero-Trust)
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # 2. Authenticate Docker to Google Artifact Registry
      - name: Setup Docker Auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      # 3. Build & Push the Go Binary
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG=${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t $IMAGE_TAG -f apps/backend-go/Dockerfile .
          docker push $IMAGE_TAG
          echo "IMAGE_URL=$IMAGE_TAG" >> $GITHUB_ENV

      # 4. Execute the Terraform Infrastructure Matrix
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Apply Terraform State
        working-directory: ./infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="image_url=${{ env.IMAGE_URL }}"
