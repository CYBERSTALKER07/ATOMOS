# KEDA ScaledObject for ai-worker — scale on Kafka consumer lag across all
# three topics the worker subscribes to.
#
# Scale-out trigger: when any replica's share of the topic lag exceeds
# lagThreshold (50 events), KEDA adds a pod.
# Scale-in: when total lag across all triggers drops to zero and the
# cooldown window expires, KEDA scales to minReplicaCount (1).
#
# Topic → consumer group mapping mirrors ai-worker/main.go exactly:
#   lab-logistics-events  → ai-worker-group
#   lab-freeze-locks      → ai-worker-freeze-group
#   lab-demand-forecast   → ai-worker-group
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-worker-scaledobject
  namespace: void-system
spec:
  scaleTargetRef:
    name: ai-worker
  pollingInterval: 10   # seconds between lag checks
  cooldownPeriod: 120   # seconds idle before scaling to minReplicaCount
  minReplicaCount: 1
  maxReplicaCount: 20   # bounded: one goroutine per partition, 20 partitions max
  triggers:
    # Primary event stream — dispatch, manifest, order lifecycle events.
    - type: kafka
      metadata:
        topic: lab-logistics-events
        bootstrapServers: ""   # injected via authenticationRef
        consumerGroup: ai-worker-group
        lagThreshold: "50"
        activationLagThreshold: "1"
        offsetResetPolicy: latest
      authenticationRef:
        name: kafka-trigger-auth
    # Freeze-lock stream — operator manual dispatch signals.
    # Lower lagThreshold: freeze locks are time-sensitive (≤250 ms doctrine).
    - type: kafka
      metadata:
        topic: lab-freeze-locks
        bootstrapServers: ""
        consumerGroup: ai-worker-freeze-group
        lagThreshold: "10"
        activationLagThreshold: "1"
        offsetResetPolicy: latest
      authenticationRef:
        name: kafka-trigger-auth
    # Demand forecast stream — AI planning events.
    - type: kafka
      metadata:
        topic: lab-demand-forecast
        bootstrapServers: ""
        consumerGroup: ai-worker-group
        lagThreshold: "50"
        activationLagThreshold: "1"
        offsetResetPolicy: latest
      authenticationRef:
        name: kafka-trigger-auth
