apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: ai-worker-pdb
  namespace: void-system
  labels:
    app: ai-worker
    tier: optimizer
spec:
  # Keep at least 1 ai-worker pod available at all times.
  # The KEDA ScaledObject may scale this to 0 during quiet periods — the PDB
  # only applies while the replica count is ≥ 1, so it never blocks KEDA
  # scale-to-zero. It does block node drains from evicting the last pod
  # during active dispatch windows.
  minAvailable: 1
  selector:
    matchLabels:
      app: ai-worker
