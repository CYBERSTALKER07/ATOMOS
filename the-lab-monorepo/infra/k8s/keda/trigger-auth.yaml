# TriggerAuthentication lets KEDA read the Kafka broker address from the shared
# ops secret rather than hardcoding it in ScaledObject metadata. The Secret
# `void-backend-secrets` is provisioned by the GKE bootstrap job from GCP
# Secret Manager — never committed to git.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: kafka-trigger-auth
  namespace: void-system
spec:
  secretTargetRef:
    - parameter: bootstrapServers
      name: void-backend-secrets
      key: KAFKA_BROKER_ADDRESS
