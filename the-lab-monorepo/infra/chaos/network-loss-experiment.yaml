---
# network-loss-experiment.yaml — LitmusChaos NetworkChaos experiment
# Injects 10 % packet loss into backend pods for 5 minutes to verify that:
#   - Redis circuit breaker triggers and recovers correctly
#   - Kafka consumers retry with exponential backoff (streak counter in runConsumer)
#   - WebSocket Pub/Sub fail-open (local delivery continues despite Redis errors)
#   - Priority guard sheds low-priority traffic correctly under degraded conditions
#   - OTel spans capture the degradation window for post-mortem analysis
#
# Apply: kubectl apply -f infra/chaos/network-loss-experiment.yaml -n void
# Status: kubectl get chaosexperiment -n void
# Run: kubectl apply -f infra/chaos/network-loss-run.yaml -n void
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosExperiment
metadata:
  name: backend-network-loss
  namespace: void
  labels:
    app.kubernetes.io/part-of: void
    chaos.layer: transport
spec:
  definition:
    scope: Namespaced
    permissions:
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["create", "list", "get", "patch", "update", "delete", "deletecollection"]
      - apiGroups: [""]
        resources: ["events"]
        verbs: ["create", "get", "list", "patch", "update"]
      - apiGroups: [""]
        resources: ["pods/exec", "pods/log", "replicationcontrollers"]
        verbs: ["create", "list", "get"]
      - apiGroups: ["apps"]
        resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
        verbs: ["list", "get"]
      - apiGroups: ["batch"]
        resources: ["jobs"]
        verbs: ["create", "list", "get", "delete", "deletecollection"]
    image: litmuschaos/go-runner:latest
    imagePullPolicy: Always
    args:
      - -c
      - ./experiments -name pod-network-loss
    command:
      - /bin/bash
    env:
      - name: TARGET_CONTAINER
        value: backend
      - name: NETWORK_INTERFACE
        value: eth0
      - name: NETWORK_PACKET_LOSS_PERCENTAGE
        value: "10"
      - name: TOTAL_CHAOS_DURATION
        value: "300"    # 5 minutes
      - name: RAMP_TIME
        value: "30"     # 30 s ramp before chaos starts (let metrics baseline)
      - name: NODE_LABEL
        value: ""       # all nodes
      - name: TC_IMAGE
        value: "litmuschaos/network-chaos:latest"
      - name: LIB_IMAGE
        value: "litmuschaos/go-runner:latest"
      - name: SEQUENCE
        value: parallel
---
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: backend-network-loss-engine
  namespace: void
spec:
  engineState: "active"
  annotationCheck: "false"
  monitoring: false
  appinfo:
    appns: "void"
    applabel: "app=backend"
    appkind: "deployment"
  chaosServiceAccount: litmus-admin
  experiments:
    - name: backend-network-loss
      spec:
        components:
          env:
            - name: NETWORK_PACKET_LOSS_PERCENTAGE
              value: "10"
            - name: TOTAL_CHAOS_DURATION
              value: "300"
        probe:
          # Probe: /healthz must return 200 within 5 s throughout the experiment.
          # If it fails, the experiment is marked Fail and alerts are raised.
          - name: healthz-probe
            type: httpProbe
            httpProbe/inputs:
              url: "http://backend.void.svc.cluster.local:8080/healthz"
              insecureSkipVerify: false
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 5s
              interval: 15s
              stopOnFailure: true
