<svg width="2200" height="248" viewBox="0 0 1600 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Clean section divider">
  <defs>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ea4335"/>
      <stop offset="35%" stop-color="#fbbc05"/>
      <stop offset="65%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#34a853"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1600" height="180" fill="#f1f3f4"/>
  <g filter="url(#soft)">
    <path d="M0,90 C230,28 470,154 698,90 C926,28 1140,154 1368,90 C1468,62 1538,76 1600,90" stroke="url(#wave)" stroke-width="10" fill="none" stroke-linecap="round"/>
    <circle cx="112" cy="90" r="22" fill="#1a73e8" opacity="0.68"/>
    <circle cx="1488" cy="90" r="22" fill="#ea4335" opacity="0.68"/>
  </g>
</svg>
