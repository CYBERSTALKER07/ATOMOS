name: payload-app-ios
options:
  bundleIdPrefix: com.pegasus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    TARGETED_DEVICE_FAMILY: "2" # iPad only
    # Camera usage removed — barcode scanning out of ecosystem scope.
    # To reinstate: add INFOPLIST_KEY_NSCameraUsageDescription with a user-facing reason
    # and re-run `xcodegen generate`. See docs/BARCODE_SCANNING.md.
    INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Receive load-out and dispatch alerts"
targets:
  payload-app-ios:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: payload-app-ios
        excludes:
          - "**/.DS_Store"
    resources:
      - path: payload-app-ios/Assets.xcassets
    info:
      path: payload-app-ios/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pegasus.payload
        INFOPLIST_FILE: payload-app-ios/Info.plist
