name: warehouse-app-ios
options:
  bundleIdPrefix: com.pegasus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    INFOPLIST_KEY_NSUserNotificationsUsageDescription: "Receive warehouse operations alerts"
targets:
  warehouse-app-ios:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WarehouseApp
        excludes:
          - "**/.DS_Store"
    resources:
      - path: WarehouseApp/Assets.xcassets
    info:
      path: WarehouseApp/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pegasus.warehouse
        INFOPLIST_FILE: WarehouseApp/Info.plist
