apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-go
  namespace: void-system
  labels:
    app: backend-go
    version: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-go
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: backend-go
      annotations:
        # Reload pods when the ops secret rotates (External Secrets checksum).
        secret.reloader.stakater.com/reload: "void-backend-secrets"
    spec:
      terminationGracePeriodSeconds: 45
      # Spread replicas across zones — single-zone outage does not drop the service.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: backend-go
      containers:
        - name: backend-go
          # Image is injected by GitHub Actions at deploy time via kustomize set image.
          image: BACKEND_GO_IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: backend-go-config
          env:
            - name: KAFKA_BROKER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: void-backend-secrets
                  key: KAFKA_BROKER_ADDRESS
            - name: REDIS_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: void-backend-secrets
                  key: REDIS_ADDRESS
            - name: SPANNER_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: void-backend-secrets
                  key: SPANNER_DATABASE_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: void-backend-secrets
                  key: JWT_SECRET
            - name: GOOGLE_CLOUD_PROJECT
              valueFrom:
                secretKeyRef:
                  name: void-backend-secrets
                  key: GOOGLE_CLOUD_PROJECT
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          lifecycle:
            # Drain in-flight requests before the pod is killed.
            preStop:
              exec:
                command: ["sleep", "5"]
      serviceAccountName: void-backend-sa
