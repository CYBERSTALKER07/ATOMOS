apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: void-backend
  namespace: void-system
  labels:
    # The release label must match the Prometheus Operator's serviceMonitorSelector.
    release: prometheus
    app: backend-go
spec:
  selector:
    matchLabels:
      app: backend-go
  namespaceSelector:
    matchNames:
      - void-system
  endpoints:
    - port: http          # matches Service port name in backend/service.yaml
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: void-ai-worker
  namespace: void-system
  labels:
    release: prometheus
    app: ai-worker
spec:
  selector:
    matchLabels:
      app: ai-worker
  namespaceSelector:
    matchNames:
      - void-system
  endpoints:
    - port: http          # ai-worker exposes /metrics on port 8081
      path: /metrics
      interval: 30s
      scrapeTimeout: 15s
      honorLabels: true
