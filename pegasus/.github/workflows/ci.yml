name: CI — Build · Test · Push

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  id-token: write   # Workload Identity Federation — no JSON key files

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: asia-south1
  GAR_REPO: ${{ vars.GAR_REPO }}              # e.g. asia-south1-docker.pkg.dev/<project>/void
  SPANNER_EMULATOR_HOST: localhost:9010

jobs:
  # ── Sync-set drift guard ───────────────────────────────────────────────────
  sync-set-guard:
    name: Sync Set Guard — architecture/dependency drift
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enforce sync-set updates
        run: |
          python3 pegasus/scripts/sync_set_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

  # ── One-eye guard suite ───────────────────────────────────────────────────
  one-eye-guards:
    name: One Eye Guards — contract · boundaries · design tokens
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: One-eye relevant paths filter
        id: one_eye_paths
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - '.github/workflows/one-eye-guards.yml'
              - 'pegasus/.github/workflows/ci.yml'
              - '.agents/extensions/ast-engine/**'
              - 'pegasus/scripts/guard_utils.py'
              - 'pegasus/scripts/contract_drift_guard.py'
              - 'pegasus/scripts/architecture_boundary_guard.py'
              - 'pegasus/scripts/design_token_enforcement_guard.py'
              - 'pegasus/scripts/contract_guard_mcp.py'
              - 'pegasus/scripts/architecture_guard_mcp.py'
              - 'pegasus/scripts/design_system_guard_mcp.py'
              - 'pegasus/scripts/production_safety_guard.py'
              - 'pegasus/scripts/visual_test_intelligence_guard.py'
              - 'pegasus/scripts/security_guard.py'
              - 'pegasus/apps/backend-go/**/*.go'
              - 'pegasus/apps/backend-go/kafka/**'
              - 'pegasus/apps/backend-go/notifications/**'
              - 'pegasus/apps/ai-worker/**'
              - 'pegasus/packages/types/**'
              - 'pegasus/packages/api-client/**'
              - 'pegasus/packages/validation/**'
              - 'pegasus/packages/optimizer-contract/**'
              - 'pegasus/apps/admin-portal/**'
              - 'pegasus/apps/factory-portal/**'
              - 'pegasus/apps/warehouse-portal/**'
              - 'pegasus/apps/retailer-app-desktop/**'
              - 'pegasus/apps/driverappios/**'
              - 'pegasus/apps/payload-terminal/**'
              - 'pegasus/apps/*-app-android/**'
              - 'pegasus/apps/*-app-ios/**'
              - 'pegasus/packages/ui-kit/**'
              - 'pegasus/infra/**'
              - 'pegasus/docker-compose.yml'
              - 'tests/**'
              - 'pegasus/tests/**'
              - 'pegasus/playwright.config.ts'
              - 'pegasus/context/design-system.md'

      - name: Skip one-eye guard suite (no relevant path changes)
        if: steps.one_eye_paths.outputs.relevant != 'true'
        run: echo "No one-eye relevant paths changed; skipping."

      - uses: actions/setup-python@v5
        if: steps.one_eye_paths.outputs.relevant == 'true'
        with:
          python-version: '3.12'

      - name: Contract Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/contract_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Architecture Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/architecture_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Design System Guard MCP
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/design_system_guard_mcp.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Production Safety Guard
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/production_safety_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Visual + Test Intelligence
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/visual_test_intelligence_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

      - name: Security Guard
        if: steps.one_eye_paths.outputs.relevant == 'true'
        run: |
          python3 pegasus/scripts/security_guard.py \
            --repo-root . \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --head-sha "${{ github.event.pull_request.head.sha }}"

  # ── VersionScan guardrails ───────────────────────────────────────────────
  versionscan:
    name: VersionScan — manifest + guardrails
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: VersionScan manifest
        working-directory: pegasus
        run: python3 scripts/versionscan.py scan --repo-root . --output-dir .versionscan

      - name: VersionScan enforce (PR changed files)
        if: github.event_name == 'pull_request'
        working-directory: pegasus
        run: python3 scripts/versionscan.py enforce --repo-root . --output-dir .versionscan --changed-only

      - name: Upload VersionScan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: versionscan-${{ github.run_id }}
          path: pegasus/.versionscan

  # ── Go backend ────────────────────────────────────────────────────────────
  backend:
    name: Backend — build · vet · test
    runs-on: ubuntu-latest

    services:
      spanner-emulator:
        image: gcr.io/cloud-spanner-emulator/emulator:latest
        ports:
          - 9010:9010
          - 9020:9020

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: pegasus/apps/backend-go/go.mod
          cache: true

      - name: go mod tidy — backend
        working-directory: pegasus
        run: go work sync

      - name: go vet — backend
        working-directory: pegasus
        run: go vet ./apps/backend-go/...

      - name: go build — backend
        working-directory: pegasus
        run: go build ./apps/backend-go/...

      - name: go test — backend (race detector)
        working-directory: pegasus
        env:
          REDIS_ADDR: localhost:6379
          SPANNER_EMULATOR_HOST: localhost:9010
          SPANNER_PROJECT_ID: void-test
          SPANNER_INSTANCE_ID: void-instance
          SPANNER_DATABASE_ID: void-db
          JWT_SECRET: ci-test-secret-32-chars-long-pad
          INTERNAL_API_KEY: ci-internal-key
          KAFKA_BROKER_ADDRESS: ""   # Kafka skipped in unit tests
        run: go test -race -timeout 120s ./apps/backend-go/...

  # ── AI worker ─────────────────────────────────────────────────────────────
  ai-worker:
    name: AI Worker — build · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: pegasus/apps/ai-worker/go.mod
          cache: true

      - name: go vet — ai-worker
        working-directory: pegasus
        run: go vet ./apps/ai-worker/...

      - name: go build — ai-worker
        working-directory: pegasus
        run: go build ./apps/ai-worker/...

      - name: go test — ai-worker
        working-directory: pegasus
        run: go test -race -timeout 60s ./apps/ai-worker/...

  # ── Admin portal ──────────────────────────────────────────────────────────
  admin-portal:
    name: Admin Portal — type-check · lint · test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pegasus/apps/admin-portal/package-lock.json

      - name: npm ci
        working-directory: pegasus/apps/admin-portal
        run: npm ci

      - name: TypeScript type-check
        working-directory: pegasus/apps/admin-portal
        run: npx tsc --noEmit

      - name: vitest
        working-directory: pegasus/apps/admin-portal
        run: npx vitest run --reporter=github-actions

  # ── Docker build + push to GAR (main branch only) ─────────────────────────
  docker-push:
    name: Docker — build and push to GAR
    runs-on: ubuntu-latest
    needs: [versionscan, backend, ai-worker, admin-portal]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - app: backend-go
            context: pegasus/apps/backend-go
            image: backend
          - app: ai-worker
            context: pegasus/apps/ai-worker
            image: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF — no JSON key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.GAR_REPO }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.GAR_REPO }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
